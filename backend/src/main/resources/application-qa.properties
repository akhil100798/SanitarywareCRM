spring.datasource.url=jdbc:h2:mem:sanitaryware_crm_qa;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.devtools.restart.enabled=false
spring.devtools.add-properties=false

jwt.secret=qa-only-change-me-qa-only-change-me-256-bit-secret
jwt.expiration=86400000

app.cors.allowed-origin-patterns=http://localhost:5173,http://localhost:5174,http://localhost:5180,http://localhost:8081,http://localhost:8082,http://localhost:19006,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5180,http://127.0.0.1:8081,http://127.0.0.1:8082,http://127.0.0.1:19006
file.upload-dir=./uploads-qa

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
