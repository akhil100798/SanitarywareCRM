services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${SERVER_PORT:-8081}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DATABASE_USERNAME: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:?CORS_ALLOWED_ORIGIN_PATTERNS is required}
    ports:
      - "8081:8081"
    volumes:
      - backend_prod_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend_prod_uploads:
